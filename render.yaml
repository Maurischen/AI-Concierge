services:
  - type: web
    name: ai-concierge
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-concierge-db
          property: connectionString

databases:
  - name: ai-concierge-db
    plan: basic-256mb
